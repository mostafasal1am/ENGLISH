<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Terminology Quiz — BY MOSTAFA SALLAM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1565c0;--blue-light:#42a5f5;--cyan:#26c6da;--emerald:#10b981;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;overflow-x:hidden;padding-bottom:80px;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;animation:drift 12s ease-in-out infinite alternate;}
.orb1{width:500px;height:500px;background:#1565c0;top:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:#0d47a1;top:40%;right:-80px;animation-delay:3s;}
.orb3{width:300px;height:300px;background:#26c6da;bottom:10%;left:20%;animation-delay:6s;}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,40px) scale(1.08)}}
.sticky{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(10,22,40,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(21,101,192,0.3);padding:10px 20px;}
.sticky-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pill{padding:5px 14px;border-radius:20px;font-size:.8em;font-weight:600;white-space:nowrap;}
.pill-q{background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.2);}
.pill-c{background:rgba(16,185,129,.2);color:#6ee7b7;border:1px solid #10b981;}
.pill-w{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid #ef4444;}
.pill-p{background:rgba(66,165,245,.2);color:#90caf9;border:1px solid #42a5f5;}
.prog-wrap{flex:1;background:rgba(255,255,255,.1);border-radius:8px;height:6px;min-width:60px;overflow:hidden;}
.prog-fill{background:linear-gradient(90deg,var(--blue),var(--cyan));height:100%;border-radius:8px;transition:width .5s;}
#startScreen{position:relative;z-index:1;max-width:680px;margin:80px auto 0;padding:20px;}
.start-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(21,101,192,0.4);border-radius:24px;padding:44px 40px;box-shadow:0 40px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,0.1);}
.atom-icon{font-size:3.5em;display:block;text-align:center;margin-bottom:14px;animation:pulse-icon 3s ease-in-out infinite;}
@keyframes pulse-icon{0%,100%{transform:scale(1);filter:drop-shadow(0 0 15px rgba(66,165,245,.4))}50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(66,165,245,.8))}}
.start-card h1{font-family:'Playfair Display',serif;font-size:2.2em;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;}
.subtitle{text-align:center;color:var(--blue-light);font-size:.95em;margin-bottom:28px;opacity:.85;}
.section-label{color:#94a3b8;font-size:.8em;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.filter-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.filter-btn{padding:7px 16px;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:500;transition:all .2s;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#94a3b8;font-family:'DM Sans',sans-serif;}
.filter-btn:hover{border-color:var(--blue-light);color:var(--blue-light);background:rgba(66,165,245,.08);}
.filter-btn.active{background:linear-gradient(135deg,rgba(21,101,192,.5),rgba(66,165,245,.2));border-color:var(--blue-light);color:var(--blue-light);box-shadow:0 0 14px rgba(66,165,245,.2);}
.start-info{color:#64748b;font-size:.9em;text-align:center;margin-bottom:22px;}
.start-info span{color:var(--blue-light);font-weight:700;}
.btn-start{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff;font-size:1.1em;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 8px 30px rgba(21,101,192,.5);}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(21,101,192,.6);}
.by-line{text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid rgba(21,101,192,0.25);}
.by-line .designed-text{color:#4a6080;font-size:.75em;letter-spacing:2px;font-weight:500;text-transform:uppercase;display:block;margin-bottom:4px;}
.by-line .name-text{color:var(--blue-light);font-size:1em;font-weight:700;letter-spacing:3px;font-family:'Playfair Display',serif;display:block;}
#quizWrapper{display:none;padding-top:75px;position:relative;z-index:1;}
.q-card{max-width:820px;margin:18px auto;padding:28px 32px;background:rgba(255,255,255,0.97);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.3);border-left:5px solid rgba(21,101,192,0.3);transition:border-color .35s;animation:slideIn .35s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-card.answered-correct{border-left-color:var(--emerald);}
.q-card.answered-wrong{border-left-color:var(--red);}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.q-num{background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff;min-width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em;flex-shrink:0;}
.cat-tag{padding:3px 12px;border-radius:20px;font-size:.72em;font-weight:600;color:#fff;}
.cat-tag.mcq{background:linear-gradient(135deg,#1565c0,#0d47a1);}
.cat-tag.tf{background:linear-gradient(135deg,#00897b,#00695c);}
.q-text{font-size:1.06em;font-weight:600;color:#0f172a;line-height:1.6;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{padding:12px 18px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;font-size:.96em;text-align:left;background:#fff;color:#334155;transition:all .18s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:10px;width:100%;}
.opt-letter{width:28px;height:28px;border-radius:50%;background:#f1f5f9;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700;color:#64748b;flex-shrink:0;transition:all .18s;}
.opt:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;transform:translateX(5px);}
.opt:hover:not(:disabled) .opt-letter{background:var(--blue);border-color:var(--blue);color:#fff;}
.opt.correct{border-color:var(--emerald);background:#f0fdf4;color:#065f46;font-weight:600;}
.opt.correct .opt-letter{background:var(--emerald);border-color:var(--emerald);color:#fff;}
.opt.wrong{border-color:var(--red);background:#fef2f2;color:#7f1d1d;}
.opt.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff;}
.opt:disabled{cursor:default;}
.q-feedback{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:.93em;line-height:2;display:none;direction:rtl;text-align:right;font-family:'DM Sans',sans-serif;}
.q-feedback.correct{background:#f0fdf4;border-right:4px solid var(--emerald);color:#065f46;}
.q-feedback.wrong{background:#fef2f2;border-right:4px solid var(--red);color:#7f1d1d;}
.q-feedback b{font-weight:700;}
.submit-wrap{max-width:820px;margin:24px auto;text-align:center;padding:0 20px;}
.btn-submit{padding:16px 70px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff;font-size:1.1em;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 8px 30px rgba(21,101,192,.5);}
.btn-submit:hover{transform:translateY(-3px);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}
#resultsBox{max-width:820px;margin:24px auto;padding:40px;background:rgba(255,255,255,.97);border-radius:24px;text-align:center;display:none;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:slideIn .4s ease;}
#resultsBox h2{font-family:'Playfair Display',serif;color:var(--navy);font-size:2em;margin-bottom:8px;}
.score-ring{width:160px;height:160px;margin:20px auto;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#e2e8f0;stroke-width:12;}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-center .big{font-size:2.4em;font-weight:900;color:var(--navy);font-family:'Playfair Display',serif;}
.score-center .small{font-size:.8em;color:#64748b;}
.result-msg{font-size:1.05em;color:#475569;margin:10px 0 24px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{border-radius:16px;padding:16px 10px;}
.stat-card.c{background:#f0fdf4;border:2px solid #10b981;}
.stat-card.w{background:#fef2f2;border:2px solid #ef4444;}
.stat-card.p{background:#eff6ff;border:2px solid #42a5f5;}
.stat-card .num{font-size:2em;font-weight:900;font-family:'Playfair Display',serif;}
.stat-card.c .num{color:#10b981;}.stat-card.w .num{color:#ef4444;}.stat-card.p .num{color:#1565c0;}
.stat-card .lbl{font-size:.8em;color:#64748b;margin-top:4px;}
.btn-re,.btn-home{width:100%;padding:14px;border:none;border-radius:14px;font-size:1.05em;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.btn-re{background:linear-gradient(135deg,var(--blue),#0d47a1);color:#fff;}
.btn-home{background:#f1f5f9;color:#475569;}
.btn-re:hover{transform:translateY(-2px);}.btn-home:hover{background:#e2e8f0;}
.review-section{text-align:right;margin-top:24px;direction:rtl;}
.review-section h3{color:var(--navy);font-size:1.1em;margin-bottom:14px;font-family:'Playfair Display',serif;}
.rev-item{padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:.88em;line-height:1.8;}
.rev-item.wrong{background:#fef2f2;border-right:4px solid var(--red);}
.rev-item .rt{font-weight:700;margin-bottom:5px;color:#1e293b;direction:ltr;text-align:left;}
.rev-item .correct-ans{color:#065f46;font-weight:600;margin-top:4px;direction:ltr;text-align:left;}
.rev-item .exp{color:#64748b;font-size:.9em;margin-top:6px;direction:rtl;text-align:right;line-height:2;}
@media(max-width:600px){.start-card{padding:28px 22px}.start-card h1{font-size:1.7em}.q-card{padding:20px 18px;margin:14px 12px}#resultsBox{padding:28px 20px}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="sticky" id="stickyBar" style="display:none">
  <div class="sticky-inner">
    <div class="pill pill-q" id="sNum">0/0</div>
    <div class="pill pill-c" id="sC">✅ 0</div>
    <div class="pill pill-w" id="sW">❌ 0</div>
    <div class="pill pill-p" id="sP">📊 0%</div>
    <div class="prog-wrap"><div class="prog-fill" id="sFill" style="width:0%"></div></div>
  </div>
</div>
<div id="startScreen">
  <div class="start-card">
    <span class="atom-icon">🩺</span>
    <h1>Medical Terminology Quiz</h1>
    <p class="subtitle">2nd Term · MCQ · True/False — Full Revision</p>
    <div class="by-line" style="margin-top:0;margin-bottom:22px;padding-top:0;border-top:none;">
      <span class="designed-text">Designed &amp; Developed by</span>
      <span class="name-text">𝑴𝑶𝑺𝑻𝑨𝑭𝑨 𝑺𝑨𝑳𝑳𝑨𝑴</span>
    </div>
    <p class="section-label">Choose Section</p>
    <div class="filter-group">
      <button class="filter-btn active" onclick="selectCat('all',this)">📚 All Questions</button>
      <button class="filter-btn" onclick="selectCat('mcq',this)">📝 MCQ Only</button>
      <button class="filter-btn" onclick="selectCat('tf',this)">✅ True / False Only</button>
    </div>
    <p class="start-info">Number of questions: <span id="qCount">0</span></p>
    <button class="btn-start" onclick="startQuiz()">Start Quiz ▶</button>
    <div class="by-line">
      <span class="designed-text">Designed &amp; Developed by</span>
      <span class="name-text">𝑴𝑶𝑺𝑻𝑨𝑭𝑨 𝑺𝑨𝑳𝑳𝑨𝑴</span>
    </div>
  </div>
</div>
<div id="quizWrapper">
  <div id="cardsContainer"></div>
  <div class="submit-wrap">
    <button class="btn-submit" id="submitBtn" onclick="showResults()" disabled>Show Results 🎯</button>
  </div>
  <div id="resultsBox">
    <h2>🎉 Quiz Complete!</h2>
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#1565c0"/><stop offset="100%" stop-color="#42a5f5"/></linearGradient></defs>
        <circle class="ring-bg" cx="80" cy="80" r="64"/>
        <circle class="ring-fg" id="ringFg" cx="80" cy="80" r="64" stroke-dasharray="402" stroke-dashoffset="402"/>
      </svg>
      <div class="score-center"><span class="big" id="rScore">0</span><span class="small">out of <span id="rTotal">0</span></span></div>
    </div>
    <div class="result-msg" id="rMsg"></div>
    <div class="stats-grid">
      <div class="stat-card c"><div class="num" id="rC">0</div><div class="lbl">✅ Correct</div></div>
      <div class="stat-card w"><div class="num" id="rW">0</div><div class="lbl">❌ Wrong</div></div>
      <div class="stat-card p"><div class="num" id="rP">0%</div><div class="lbl">📊 Score</div></div>
    </div>
    <button class="btn-re" onclick="startQuiz()">🔄 Retry Quiz</button>
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
    <div class="review-section" id="reviewDiv"></div>
  </div>
</div>
<script>
const L=['A','B','C','D'];
let cat='all',qs=[],ans=0,cor=0,wr=0;
const MCQ=[
{cat:'mcq',q:"Which term refers to the medical study of the digestive system?",opts:["Gastroenterology","Proctology","Endocrinology","Nephrology"],c:0,exp:"<b>Gastroenterology</b> هي فرع الطب المتخصص في دراسة وعلاج الجهاز الهضمي (<b>digestive system</b>) وأمراضه."},
{cat:'mcq',q:'The term "stomat/o" refers to which part of the digestive system?',opts:["Esophagus","Stomach","Mouth","Intestine"],c:2,exp:"<b>Stomat/o</b> هي الجذر اللغوي الذي يعني الفم (<b>mouth</b>) — أول جزء في الجهاز الهضمي."},
{cat:'mcq',q:"What is the term for inflammation of the stomach?",opts:["Gastritis","Enteritis","Hepatitis","Cholecystitis"],c:0,exp:"<b>Gastritis</b> = gastr (معدة / stomach) + itis (التهاب / inflammation) — التهاب بطانة المعدة."},
{cat:'mcq',q:'The term "hepat/o" refers to which organ?',opts:["Pancreas","Liver","Kidney","Gallbladder"],c:1,exp:"<b>Hepat/o</b> هو الجذر اللغوي الذي يعني الكبد (<b>liver</b>) — مثل: hepatitis، hepatomegaly."},
{cat:'mcq',q:'The suffix "-phagia" means:',opts:["Swallowing","Digestion","Secretion","Defecation"],c:0,exp:"اللاحقة <b>-phagia</b> تعني البلع (<b>swallowing</b>) — مثل: dysphagia = صعوبة البلع."},
{cat:'mcq',q:'What does "cholelithiasis" refer to?',opts:["Inflammation of the pancreas","Formation of gallstones","Presence of ulcers","Enlargement of the liver"],c:1,exp:"<b>Cholelithiasis</b>: chole (صفراء / bile) + lith (حجر / stone) + iasis (حالة) = تكوّن حصوات المرارة (<b>gallstones</b>)."},
{cat:'mcq',q:"The medical term for difficulty swallowing is:",opts:["Dysphagia","Dyspepsia","Dysphonia","Dysuria"],c:0,exp:"<b>Dysphagia</b>: dys (صعوبة / difficulty) + phagia (بلع / swallowing) = صعوبة في البلع."},
{cat:'mcq',q:"What is the term for the surgical removal of the gallbladder?",opts:["Cholecystectomy","Cholecystitis","Hepatectomy","Colectomy"],c:0,exp:"<b>Cholecystectomy</b>: cholecyst (مرارة / gallbladder) + ectomy (استئصال / removal) = استئصال المرارة جراحيًا."},
{cat:'mcq',q:'The combining form "proct/o" refers to:',opts:["Stomach","Rectum and anus","Liver","Pancreas"],c:1,exp:"<b>Proct/o</b> هو الجذر اللغوي الذي يعني المستقيم والشرج (<b>rectum and anus</b>) — مثل: proctology، proctitis."},
{cat:'mcq',q:"The condition characterized by inflammation of the small intestine is:",opts:["Enteritis","Gastritis","Proctitis","Hepatitis"],c:0,exp:"<b>Enteritis</b>: enter (أمعاء / intestine) + itis (التهاب / inflammation) = التهاب الأمعاء الدقيقة."},
{cat:'mcq',q:'The term "steatorrhea" refers to:',opts:["Blood in the stool","Excessive fat in the stool","Frequent urination","Inflammation of the rectum"],c:1,exp:"<b>Steatorrhea</b>: steat (دهون / fat) + rrhea (تدفق / flow) = وجود دهون زائدة في البراز (<b>stool</b>)، دليل على سوء الامتصاص."},
{cat:'mcq',q:'The suffix "-emesis" means:',opts:["Vomiting","Swelling","Inflammation","Digestion"],c:0,exp:"اللاحقة <b>-emesis</b> تعني القيء (<b>vomiting</b>) — مثل: hematemesis = قيء دموي."},
{cat:'mcq',q:'What does "melena" refer to?',opts:["Yellowing of the skin","Black, tarry stools","Swollen abdomen","Loss of appetite"],c:1,exp:"<b>Melena</b> تعني البراز الأسود القطراني (<b>black, tarry stools</b>) الناتج عن نزيف في الجهاز الهضمي العلوي."},
{cat:'mcq',q:"The esophagus connects the:",opts:["Mouth to stomach","Stomach to small intestine","Liver to pancreas","Large intestine to rectum"],c:0,exp:"<b>Esophagus</b> (المريء) هو الأنبوب العضلي الذي يصل الفم (<b>mouth</b>) بالمعدة (<b>stomach</b>)."},
{cat:'mcq',q:"Which term refers to the presence of gallstones?",opts:["Cholecystitis","Cholelithiasis","Cholecystectomy","Cholelithotomy"],c:1,exp:"<b>Cholelithiasis</b> = وجود حصوات المرارة (<b>gallstones</b>). أما Cholecystitis = التهاب، وCholecystectomy = استئصال."},
{cat:'mcq',q:'What does "hematemesis" mean?',opts:["Blood in the stool","Vomiting blood","Blood in the urine","Pain in the stomach"],c:1,exp:"<b>Hematemesis</b>: hemat (دم / blood) + emesis (قيء / vomiting) = قيء دموي، علامة على نزيف في الجهاز الهضمي العلوي."},
{cat:'mcq',q:"The right atrium receives deoxygenated blood from:",opts:["Pulmonary vein","Aorta","Superior and inferior vena cava","Coronary arteries"],c:2,exp:"الأذين الأيمن (<b>right atrium</b>) يستقبل الدم غير المؤكسج من الجسم عبر الوريد الأجوف العلوي والسفلي (<b>superior and inferior vena cava</b>)."},
{cat:'mcq',q:"Which valve is located between the right atrium and right ventricle?",opts:["Aortic valve","Pulmonary valve","Mitral valve","Tricuspid valve"],c:3,exp:"الصمام ثلاثي الشرفات (<b>Tricuspid valve</b>) يفصل بين الأذين الأيمن (<b>right atrium</b>) والبطين الأيمن (<b>right ventricle</b>)."},
{cat:'mcq',q:"What does the term ischemia mean?",opts:["Infection in the heart muscle","Lack of blood supply to tissues","Increased blood flow","Abnormal heart rhythm"],c:1,exp:"<b>Ischemia</b> تعني نقص إمداد الدم للأنسجة (<b>lack of blood supply to tissues</b>)، مما يسبب نقص الأكسجين."},
{cat:'mcq',q:"Which term describes the absence of breathing?",opts:["Dyspnea","Tachypnea","Apnea","Bradypnea"],c:2,exp:"<b>Apnea</b>: a (بدون / without) + pnea (تنفس / breathing) = انقطاع كامل للتنفس (<b>absence of breathing</b>)."},
{cat:'mcq',q:"The medical term for difficulty breathing is:",opts:["Tachypnea","Dyspnea","Apnea","Orthopnea"],c:1,exp:"<b>Dyspnea</b>: dys (صعوبة / difficulty) + pnea (تنفس / breathing) = ضيق أو صعوبة في التنفس."},
{cat:'mcq',q:"What is the medical term for a nosebleed?",opts:["Hemoptysis","Epistaxis","Sinusitis","Rhinorrhea"],c:1,exp:"<b>Epistaxis</b> هو المصطلح الطبي لنزيف الأنف (<b>nosebleed</b>)."},
{cat:'mcq',q:'The term "hypoxia" means:',opts:["Low oxygen in the blood","Excess oxygen in the blood","High carbon dioxide levels","Normal oxygen levels"],c:0,exp:"<b>Hypoxia</b>: hypo (منخفض / low) + ox (أكسجين / oxygen) = نقص الأكسجين في الأنسجة (<b>low oxygen in blood</b>)."},
{cat:'mcq',q:'The suffix "-ectasis" means:',opts:["Narrowing","Expansion or dilation","Inflammation","Surgical removal"],c:1,exp:"اللاحقة <b>-ectasis</b> تعني التوسع أو الاتساع (<b>expansion or dilation</b>) — مثل: bronchiectasis = توسع القصبات الهوائية."},
{cat:'mcq',q:"What is the term for the surgical removal of the appendix?",opts:["Cholecystectomy","Hysterectomy","Appendectomy","Gastrectomy"],c:2,exp:"<b>Appendectomy</b>: appendix (الزائدة الدودية) + ectomy (استئصال / removal) = استئصال الزائدة الدودية جراحيًا."},
{cat:'mcq',q:"What is the term for a doctor who specializes in the treatment of Heart diseases?",opts:["Oncologist","Cardiologist","Neurologist","Dermatologist"],c:1,exp:"<b>Cardiologist</b>: cardi (قلب / heart) + ologist (متخصص / specialist) = طبيب متخصص في أمراض القلب."},
{cat:'mcq',q:"What is the term for the surgical removal of the gallbladder? (v2)",opts:["Colectomy","Gastrectomy","Cholecystectomy","Hysterectomy"],c:2,exp:"<b>Cholecystectomy</b> = استئصال المرارة (<b>gallbladder</b>). أما Colectomy = استئصال القولون (<b>colon</b>)."},
{cat:'mcq',q:"______ is surgical puncture to aspirate fluid from the abdomen.",opts:["Abdominocentesis","Amniocentesis","Arthrocentesis","Arthroscopy"],c:0,exp:"<b>Abdominocentesis</b>: abdomen (البطن) + centesis (ثقب جراحي / surgical puncture) = ثقب البطن لسحب السائل."},
{cat:'mcq',q:"What is the term for abnormally swollen veins in the lower esophagus, often associated with liver disease?",opts:["Hemorrhoids","Esophageal varices","Crohn's disease","Diverticulitis"],c:1,exp:"<b>Esophageal varices</b> = دوالي المريء — أوردة متوسعة في المريء السفلي مرتبطة بأمراض الكبد (<b>liver disease</b>)."},
{cat:'mcq',q:"What is the term for swollen, enlarged veins inside and outside the anus and rectum?",opts:["Hemorrhoids","Esophageal varices","Crohn's disease","Diverticulitis"],c:0,exp:"<b>Hemorrhoids</b> = البواسير — أوردة متوسعة في منطقة الشرج والمستقيم (<b>anus and rectum</b>)."},
{cat:'mcq',q:"A/an _____ is a surgical incision into the colon.",opts:["Colostomy","Colectomy","Colotomy","Chyme"],c:2,exp:"<b>Colotomy</b>: col (قولون / colon) + otomy (شق / incision) = شق جراحي في القولون."},
{cat:'mcq',q:"What is the term for surgical repair of the abdomen?",opts:["Colectomy","Abdominocentesis","Abdominoplasty","Celiotomy"],c:2,exp:"<b>Abdominoplasty</b>: abdomen (البطن) + plasty (إصلاح جراحي / surgical repair) = عملية شد البطن أو إصلاحه جراحيًا."},
{cat:'mcq',q:"What is the term for creation of an artificial opening in the colon?",opts:["Colectomy","Colostomy","Colotomy","Celiotomy"],c:1,exp:"<b>Colostomy</b>: col (قولون / colon) + ostomy (فتحة اصطناعية / artificial opening) = إنشاء فتحة اصطناعية في القولون."},
{cat:'mcq',q:"The term 'Laparotomy' refers to the incision into which organ?",opts:["Stomach","Gallbladder","Appendix","Abdominal cavity"],c:3,exp:"<b>Laparotomy</b>: lapar (بطن / abdomen) + otomy (شق / incision) = شق جراحي في تجويف البطن (<b>abdominal cavity</b>)."},
{cat:'mcq',q:"What is the term for study of disease and disorders of the rectum?",opts:["Cardiology","Proctology","Proctoptosis","Nephrology"],c:1,exp:"<b>Proctology</b>: proct (مستقيم / rectum) + ology (علم / study) = التخصص الطبي المعني بأمراض المستقيم والشرج."},
{cat:'mcq',q:"What is the term for inflammation of irregular bulging pouches in the wall of the large intestine?",opts:["Stomatitis","Steatohepatitis","Glossitis","Diverticulitis"],c:3,exp:"<b>Diverticulitis</b> = التهاب الرتوج — جيوب صغيرة تبرز من جدار القولون (<b>large intestine</b>) وتلتهب."},
{cat:'mcq',q:"Which term refers to a movement that decreases the angle of a joint?",opts:["Flexion","Extension","Abduction","Adduction"],c:0,exp:"<b>Flexion</b> (الانثناء) = حركة تُقلل الزاوية بين جزأين من الجسم عند المفصل (<b>joint</b>) — مثل ثني الكوع."},
{cat:'mcq',q:"Which of the following statements describes abduction of a joint?",opts:["Decreases the joint angle","Movement away from the midline","Increases the joint angle","Movement towards the midline"],c:1,exp:"<b>Abduction</b> = حركة بعيدًا عن خط منتصف الجسم (<b>movement away from the midline</b>) — مثل رفع الذراع جانبًا."},
{cat:'mcq',q:"Which term describes the movement of a body part AWAY from the midline of the body?",opts:["Flexion","Extension","Abduction","Adduction"],c:2,exp:"<b>Abduction</b>: ab (بعيد / away) + duction (حركة / movement) = تحريك الجزء بعيدًا عن خط منتصف الجسم (<b>midline</b>)."},
{cat:'mcq',q:"Which term describes the movement of a body part TOWARDS the midline of the body?",opts:["Flexion","Extension","Abduction","Adduction"],c:3,exp:"<b>Adduction</b>: ad (نحو / toward) + duction (حركة / movement) = تحريك الجزء نحو خط منتصف الجسم (<b>midline</b>)."},
{cat:'mcq',q:"Which term describes the movement of the foot pointing more superiorly?",opts:["Flexion","Dorsiflexion","Abduction","Plantarflexion"],c:1,exp:"<b>Dorsiflexion</b> = ثني ظهر القدم نحو أعلى (نحو أسفل الساق) — عكس <b>Plantarflexion</b> الذي يكون نحو الأسفل."},
{cat:'mcq',q:"Which term describes the movement of the hand or foot turning upward?",opts:["Pronation","Dorsiflexion","Supination","Plantarflexion"],c:2,exp:"<b>Supination</b> = تدوير الساعد أو القدم لأعلى بحيث يكون الكف أو باطن القدم متجهًا للأعلى (<b>turning upward</b>)."},
{cat:'mcq',q:"Which term describes the movement of the hand or foot turning downward?",opts:["Pronation","Dorsiflexion","Supination","Plantarflexion"],c:0,exp:"<b>Pronation</b> = تدوير الساعد أو القدم لأسفل بحيث يكون الكف متجهًا للأسفل (<b>turning downward</b>)."},
{cat:'mcq',q:"Which term refers to a movement that increases the angle of a joint?",opts:["Flexion","Extension","Abduction","Adduction"],c:1,exp:"<b>Extension</b> (المد) = حركة تُزيد الزاوية بين جزأين من الجسم عند المفصل (<b>joint</b>) — مثل مد الكوع."},
{cat:'mcq',q:'The term "Hyperthyroidism" describes:',opts:["Excessive thyroid gland activity","Deficient secretion of thyroid hormones","Inflammation of the thyroid gland","Enlargement of the thyroid gland"],c:0,exp:"<b>Hyperthyroidism</b>: hyper (زيادة / excessive) + thyroid = فرط نشاط الغدة الدرقية (<b>thyroid gland</b>) وإفراز زائد للهرمونات."},
{cat:'mcq',q:'The term "hyperglycemia" refers to:',opts:["Abnormally low blood sugar","Abnormally high blood calcium","Abnormally high blood sugar","Abnormally low blood potassium"],c:2,exp:"<b>Hyperglycemia</b>: hyper (مرتفع / high) + glyc (سكر / sugar) + emia (دم / blood) = ارتفاع السكر في الدم بصورة غير طبيعية."},
{cat:'mcq',q:'The term "Hyponatremia" refers to:',opts:["Abnormally low blood sugar","Abnormally high blood calcium","Abnormally low blood sodium","Abnormally low blood potassium"],c:2,exp:"<b>Hyponatremia</b>: hypo (منخفض / low) + natr (صوديوم / sodium) + emia (دم / blood) = انخفاض الصوديوم في الدم."},
{cat:'mcq',q:'The term "polydipsia" refers to:',opts:["Excessive thirst","Excessive urination","Excessive hunger","Excessive sweating"],c:0,exp:"<b>Polydipsia</b>: poly (كثير / excessive) + dipsia (عطش / thirst) = عطش مفرط، شائع في مرض السكري (<b>diabetes</b>)."},
{cat:'mcq',q:'The term "thyroidectomy" refers to the:',opts:["Inflammation of the thyroid gland","Surgical removal of the thyroid gland","Enlargement of the thyroid gland","Overactivity of the thyroid gland"],c:1,exp:"<b>Thyroidectomy</b>: thyroid (الغدة الدرقية) + ectomy (استئصال / removal) = الاستئصال الجراحي للغدة الدرقية."},
{cat:'mcq',q:'The term "pancreatitis" refers to the:',opts:["Surgical removal of the pancreas","Inflammation of the pancreas","Underactivity of the pancreas","Overactivity of the pancreas"],c:1,exp:"<b>Pancreatitis</b>: pancreato (بنكرياس / pancreas) + itis (التهاب / inflammation) = التهاب البنكرياس."},
{cat:'mcq',q:"Which term refers to a condition of excessive thyroid hormone production?",opts:["Hypothyroidism","Hyperthyroidism","Thyroiditis","Thyroidectomy"],c:1,exp:"<b>Hyperthyroidism</b> = إنتاج مفرط لهرمونات الغدة الدرقية (<b>thyroid hormones</b>) — T3 و T4."},
{cat:'mcq',q:'What does the prefix "adreno-" refer to in medical terminology?',opts:["Liver","Pancreas","Kidney","Adrenal gland"],c:3,exp:"البادئة <b>Adreno-</b> تشير إلى الغدة الكظرية (<b>adrenal gland</b>) — الموجودة فوق الكلى. مثل: adrenalectomy."},
{cat:'mcq',q:'What does "hypoglycemia" mean?',opts:["High thyroid hormone","Low calcium in the blood","Low blood sugar","Excess insulin"],c:2,exp:"<b>Hypoglycemia</b>: hypo (منخفض / low) + glyc (سكر / sugar) + emia (دم / blood) = انخفاض السكر في الدم."},
{cat:'mcq',q:'What is the medical term for "enlarged thyroid"?',opts:["Thyroiditis","Thyromegaly","Hyperthyroidism","Goitrectomy"],c:1,exp:"<b>Thyromegaly</b>: thyro (درقية / thyroid) + megaly (تضخم / enlargement) = تضخم الغدة الدرقية (<b>goiter</b>)."},
{cat:'mcq',q:'Which prefix means "under" or "below normal"?',opts:["Hyper-","Dys-","Hypo-","Anti-"],c:2,exp:"البادئة <b>Hypo-</b> تعني «تحت» أو «أقل من الطبيعي» (<b>under / below normal</b>) — مثل: hypoglycemia، hyponatremia."},
{cat:'mcq',q:'"Pancreatectomy" refers to:',opts:["Enlargement of the pancreas","Inflammation of the pancreas","Surgical removal of the pancreas","Dysfunction of the pancreas"],c:2,exp:"<b>Pancreatectomy</b>: pancreato (بنكرياس / pancreas) + ectomy (استئصال / removal) = الاستئصال الجراحي للبنكرياس."},
{cat:'mcq',q:"Which condition results from hypersecretion of growth hormone in adults?",opts:["Gigantism","Dwarfism","Acromegaly","Hypopituitarism"],c:2,exp:"<b>Acromegaly</b> = ضخامة الأطراف، تنتج من فرط إفراز هرمون النمو (<b>growth hormone</b>) عند البالغين بعد اكتمال النمو."},
{cat:'mcq',q:'What does "Hypercalcemia" mean?',opts:["High thyroid hormone","High calcium in the blood","High blood sugar","High potassium in the blood"],c:1,exp:"<b>Hypercalcemia</b>: hyper (مرتفع / high) + calc (كالسيوم / calcium) + emia (دم / blood) = ارتفاع الكالسيوم في الدم."},
{cat:'mcq',q:'What does "Hyperkalemia" mean?',opts:["High thyroid hormone","High calcium in the blood","High blood sugar","High potassium in the blood"],c:3,exp:"<b>Hyperkalemia</b>: hyper (مرتفع / high) + kal (بوتاسيوم / potassium) + emia (دم / blood) = ارتفاع البوتاسيوم في الدم."},
{cat:'mcq',q:'What does "Adenosis" mean?',opts:["Enlarged gland","Abnormal condition of a gland","Excision of the adrenal glands","Inflammation of the gland"],c:1,exp:"<b>Adenosis</b>: aden (غدة / gland) + osis (حالة غير طبيعية / abnormal condition) = أي حالة مرضية تصيب الغدة."},
{cat:'mcq',q:"Which condition is caused by hypersecretion of growth hormone in children?",opts:["Acromegaly","Gigantism","Dwarfism","Diabetes"],c:1,exp:"<b>Gigantism</b> (العملقة) = فرط إفراز هرمون النمو (<b>growth hormone</b>) عند الأطفال قبل اكتمال النمو → طول شديد غير طبيعي."},
{cat:'mcq',q:"Which prefix refers to skin in medical terms?",opts:["Myo-","Derma-","Neuro-","Hepato-"],c:1,exp:"البادئة <b>Derma-</b> (أو Dermato-) تعني الجلد (<b>skin</b>) — مثل: dermatitis، dermatology، dermatoplasty."},
{cat:'mcq',q:"What does the term subcutaneous mean?",opts:["Beneath the skin","Over the skin","Through the skin","Around the skin"],c:0,exp:"<b>Subcutaneous</b>: sub (تحت / beneath) + cutane (جلد / skin) = تحت الجلد (<b>beneath the skin</b>) — مثل الحقن تحت الجلد."},
{cat:'mcq',q:"The term dermatitis means:",opts:["Skin tumor","Skin inflammation","Skin pain","Skin hardening"],c:1,exp:"<b>Dermatitis</b>: dermat (جلد / skin) + itis (التهاب / inflammation) = التهاب الجلد مع احمرار وحكة."},
{cat:'mcq',q:"What is the term for a fatty tumor under the skin?",opts:["Melanoma","Carcinoma","Lipoma","Fibroma"],c:2,exp:"<b>Lipoma</b>: lip (دهن / fat) + oma (ورم / tumor) = ورم دهني حميد (<b>benign</b>) يقع تحت الجلد."},
{cat:'mcq',q:"Which condition is a fungal infection of the skin?",opts:["Psoriasis","Tinea","Eczema","Urticaria"],c:1,exp:"<b>Tinea</b> هي عدوى فطرية للجلد (<b>fungal infection of the skin</b>) — تشمل: tinea corporis (قوباء حلقية)، tinea pedis (قدم الرياضي)."},
{cat:'mcq',q:"What does melanoma mean?",opts:["Tumor of fat","Skin inflammation","Malignant tumor of pigment cells","Infection of sebaceous gland"],c:2,exp:"<b>Melanoma</b>: melan (صبغة / pigment) + oma (ورم / tumor) = ورم خبيث (<b>malignant tumor</b>) ينشأ من خلايا الميلانين."},
{cat:'mcq',q:"Which term means plastic surgery of the skin?",opts:["Dermatoplasty","Dermectomy","Dermoscopy","Dermatitis"],c:0,exp:"<b>Dermatoplasty</b>: dermato (جلد / skin) + plasty (إصلاح جراحي / surgical repair) = الجراحة التجميلية للجلد."},
{cat:'mcq',q:"What is the meaning of onychomycosis?",opts:["Nail inflammation","Nail fungus infection","Nail discoloration","Nail removal"],c:1,exp:"<b>Onychomycosis</b>: onych (ظفر / nail) + myco (فطر / fungus) + osis (حالة) = عدوى فطرية تصيب الأظافر (<b>nail fungus infection</b>)."},
{cat:'mcq',q:"Which term refers to sweat glands?",opts:["Sebaceous","Apocrine","Eccrine","Sudoriferous"],c:3,exp:"<b>Sudoriferous glands</b> هي الغدد العرقية (<b>sweat glands</b>). أما <b>Sebaceous glands</b> فهي الغدد الدهنية التي تفرز الزهم."},
{cat:'mcq',q:"What does hidradenitis mean?",opts:["Inflammation of sebaceous glands","Inflammation of sweat glands","Inflammation of hair follicles","Inflammation of subcutaneous tissue"],c:1,exp:"<b>Hidradenitis</b>: hidr (عرق / sweat) + aden (غدة / gland) + itis (التهاب / inflammation) = التهاب الغدد العرقية."},
{cat:'mcq',q:"Which of the following best defines carcinoma?",opts:["Benign tumor","Malignant skin cancer","Inflammatory skin disease","Fungal infection"],c:1,exp:"<b>Carcinoma</b> = سرطان خبيث (<b>malignant cancer</b>) ينشأ من الخلايا الظهارية — من أشهر أنواع سرطان الجلد."},
{cat:'mcq',q:"Which cells produce melanin?",opts:["Keratinocytes","Melanocytes","Fibroblasts","Langerhans cells"],c:1,exp:"<b>Melanocytes</b> هي الخلايا المتخصصة في البشرة (<b>epidermis</b>) التي تنتج الميلانين (<b>melanin</b>) — الصبغة المسؤولة عن لون الجلد."},
{cat:'mcq',q:"What is the outer, protective layer of the skin?",opts:["Epidermis","Stratum basale","Dermis","Subcutaneous fat"],c:0,exp:"<b>Epidermis</b> هي الطبقة الخارجية للجلد (<b>outermost layer of skin</b>) — تعمل كحاجز واقٍ ضد البيئة الخارجية."},
{cat:'mcq',q:"What is the meaning of Onychophagia?",opts:["Nail inflammation","Nail fungus infection","Nail discoloration","Nail biting"],c:3,exp:"<b>Onychophagia</b>: onych (ظفر / nail) + phagia (أكل / eating/biting) = عادة قضم الأظافر (<b>nail biting</b>)."},
{cat:'mcq',q:"What is the meaning of Onychocryptosis?",opts:["Nail inflammation","Nail fungus infection","An ingrown nail","Nail biting"],c:2,exp:"<b>Onychocryptosis</b>: onych (ظفر / nail) + crypt (مختفي / hidden) + osis (حالة) = الظفر المنغرس (<b>ingrown nail</b>)."},
{cat:'mcq',q:"Which combining form means nail?",opts:["Trich/o","Seb/o","Onych/o","Pil/o"],c:2,exp:"<b>Onych/o</b> هو الجذر اللغوي الذي يعني الظفر (<b>nail</b>) — مثل: onychomycosis، onychophagia، onychocryptosis."},
{cat:'mcq',q:"Which of the following is not part of the integumentary system?",opts:["Skin","Hair","Teeth","Nails"],c:2,exp:"الأسنان (<b>Teeth</b>) ليست جزءًا من الجهاز الجلدي (<b>integumentary system</b>). الجهاز الجلدي يشمل: الجلد، الشعر، الأظافر، والغدد."},
{cat:'mcq',q:"A white discoloration of the skin is called:",opts:["Melanosis","Leukoderma","Erythema","Xanthoderma"],c:1,exp:"<b>Leukoderma</b>: leuko (أبيض / white) + derma (جلد / skin) = بقع أو تغيّر لون الجلد إلى الأبيض (<b>white discoloration</b>)."},
{cat:'mcq',q:"Yellow discoloration of the skin is termed:",opts:["Erythema","Cyanosis","Jaundice","Melanoma"],c:2,exp:"<b>Jaundice</b> (اليرقان) = اصفرار الجلد والعيون (<b>yellow discoloration</b>) بسبب ارتفاع البيليروبين (<b>bilirubin</b>) في الدم."},
{cat:'mcq',q:"Swelling caused by fluid retention is:",opts:["Edema","Erythema","Cyanosis","Jaundice"],c:0,exp:"<b>Edema</b> (الوذمة) = تراكم السوائل الزائدة في الأنسجة مما يسبب التورم (<b>swelling due to fluid retention</b>)."},
{cat:'mcq',q:"A surgical incision into the skin is:",opts:["Dermatitis","Dermatoplasty","Dermotomy","Dermabrasion"],c:2,exp:"<b>Dermotomy</b>: derm (جلد / skin) + otomy (شق / incision) = شق جراحي في الجلد (<b>surgical incision into the skin</b>)."},
{cat:'mcq',q:"What is the term for surgical removal of skin tissue?",opts:["Dermectomy","Dermatoplasty","Biopsy","Dermabrasion"],c:0,exp:"<b>Dermectomy</b>: derm (جلد / skin) + ectomy (استئصال / removal) = الاستئصال الجراحي لنسيج الجلد (<b>skin tissue</b>)."},
{cat:'mcq',q:"Necrosis of skin refers to:",opts:["Inflammation","Overgrowth","Tissue death","Swelling"],c:2,exp:"<b>Necrosis</b> = موت الأنسجة (<b>tissue death</b>) — نخر الجلد يعني موت خلايا الجلد بصورة غير طبيعية."},
{cat:'mcq',q:"What is the term for fibrous tumor of the skin?",opts:["Dermectomy","Dermatoplasty","Dermatofibroma","Dermabrasion"],c:2,exp:"<b>Dermatofibroma</b>: dermato (جلد / skin) + fibr (ليف / fiber) + oma (ورم / tumor) = ورم ليفي حميد في الجلد."},
{cat:'mcq',q:'What does the prefix "a-" or "an-" mean?',opts:["With","Not or without","Before","After"],c:1,exp:"البادئة <b>a-/an-</b> تعني «لا» أو «بدون» (<b>not or without</b>) — مثل: apnea (بدون تنفس)، anemia (بدون دم كافٍ)."},
{cat:'mcq',q:'What does the prefix "peri-" mean?',opts:["Outside","Near","Around","Before"],c:2,exp:"البادئة <b>peri-</b> تعني «حول» أو «محيط» (<b>around</b>) — مثل: pericardium (حول القلب)، periosteum (حول العظم)."},
{cat:'mcq',q:'What does the prefix "re-" mean?',opts:["Outside","Near","Around","Again"],c:3,exp:"البادئة <b>re-</b> تعني «مجددًا» أو «مرة أخرى» (<b>again</b>) — مثل: rehabilitation (إعادة التأهيل)."},
{cat:'mcq',q:'What does the prefix "pseud(o)-" mean?',opts:["Outside","False","True","Again"],c:1,exp:"البادئة <b>pseudo-</b> تعني «زائف» أو «كاذب» (<b>false</b>) — مثل: pseudocyst (كيس زائف)."},
{cat:'mcq',q:'What does the prefix "eu-" mean?',opts:["Outside","False","True / normal","Again"],c:2,exp:"البادئة <b>eu-</b> تعني «جيد» أو «طبيعي» (<b>good / normal</b>) — مثل: euphoria (بهجة)، euglycemia (سكر دم طبيعي)."},
];
const TF=[
{cat:'tf',isTF:true,q:"Acromegaly refers to enlargement of the extremities.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Acromegaly</b> (ضخامة الأطراف) تنتج من فرط إفراز هرمون النمو (<b>growth hormone</b>) عند البالغين، وتؤدي إلى تضخم اليدين والقدمين والوجه."},
{cat:'tf',isTF:true,q:"Adenectomy means inflammation of a gland.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Adenectomy</b> تعني الاستئصال الجراحي (<b>excision / removal</b>) وليس الالتهاب. أما التهاب الغدة فهو <b>Adenitis</b>."},
{cat:'tf',isTF:true,q:"Adenitis is inflammation of a gland.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Adenitis</b>: aden (غدة / gland) + itis (التهاب / inflammation) = التهاب الغدة."},
{cat:'tf',isTF:true,q:"Adenomegaly means enlarged gland.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Adenomegaly</b>: aden (غدة / gland) + megaly (تضخم / enlargement) = تضخم غير طبيعي للغدة."},
{cat:'tf',isTF:true,q:"Adenosis means normal condition of a gland.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Adenosis</b> تعني حالة غير طبيعية (<b>abnormal condition</b>) للغدة. اللاحقة <b>-osis</b> دائمًا تدل على حالة مرضية."},
{cat:'tf',isTF:true,q:"Adrenalectomy is excision of the adrenal glands.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Adrenalectomy</b>: adrenal (كظرية / adrenal) + ectomy (استئصال / excision) = استئصال الغدة الكظرية."},
{cat:'tf',isTF:true,q:"Adrenomegaly means shrinkage of adrenal glands.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Adrenomegaly</b> تعني تضخم (<b>enlargement</b>) الغدة الكظرية، وليس ضمورها. اللاحقة <b>-megaly</b> دائمًا = تضخم."},
{cat:'tf',isTF:true,q:"Endocrinology is the study of the endocrine system.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Endocrinology</b>: endocrin (الجهاز الصماء / endocrine) + ology (علم / study) = علم الغدد الصماء وأمراضها."},
{cat:'tf',isTF:true,q:"Endocrinopathy means disease of the endocrine system.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Endocrinopathy</b>: endocrin + pathy (مرض / disease) = أي مرض يصيب الجهاز الصماء (<b>endocrine system</b>)."},
{cat:'tf',isTF:true,q:"Euglycemia means excessive sugar in the blood.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Euglycemia</b> تعني مستوى سكر طبيعي (<b>normal blood sugar</b>). البادئة <b>eu-</b> = طبيعي/جيد. المفرط = <b>Hyperglycemia</b>."},
{cat:'tf',isTF:true,q:"Hypercalcemia means excessive calcium in the blood.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Hypercalcemia</b>: hyper (مرتفع / excessive) + calc (كالسيوم / calcium) + emia = ارتفاع الكالسيوم في الدم."},
{cat:'tf',isTF:true,q:"Hyperglycemia means low blood sugar.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Hyperglycemia</b> تعني ارتفاع (<b>high</b>) السكر في الدم. أما الانخفاض فهو <b>Hypoglycemia</b>."},
{cat:'tf',isTF:true,q:"Hyperkalemia means excessive potassium in the blood.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Hyperkalemia</b>: hyper (مرتفع / excessive) + kal (بوتاسيوم / potassium) + emia = ارتفاع البوتاسيوم في الدم."},
{cat:'tf',isTF:true,q:"Hyperthyroidism refers to decreased thyroid activity.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Hyperthyroidism</b> تعني فرط (<b>excessive</b>) نشاط الدرقية. أما نقص النشاط فهو <b>Hypothyroidism</b>."},
{cat:'tf',isTF:true,q:"Hyponatremia means deficient sodium in the blood.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Hyponatremia</b>: hypo (منخفض / low) + natr (صوديوم / sodium) + emia = انخفاض الصوديوم في الدم."},
{cat:'tf',isTF:true,q:"Parathyroidectomy means removal of the parathyroid glands.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Parathyroidectomy</b>: parathyroid (جارات الدرقية / parathyroid) + ectomy (استئصال / removal) = استئصال الغدد جارات الدرقية."},
{cat:'tf',isTF:true,q:"Polydipsia means condition of excessive thirst.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Polydipsia</b>: poly (كثير / excessive) + dipsia (عطش / thirst) = عطش مفرط، شائع في <b>diabetes mellitus</b>."},
{cat:'tf',isTF:true,q:"Acromegaly results from low growth hormone levels.",opts:["True","False"],c:1,exp:"<b>خطأ ❌</b> — <b>Acromegaly</b> تنتج من فرط (<b>excess</b>) إفراز هرمون النمو (<b>growth hormone</b>) وليس من نقصه."},
{cat:'tf',isTF:true,q:"Adrenopathy means disease of the adrenal glands.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Adrenopathy</b>: adreno (كظرية / adrenal) + pathy (مرض / disease) = أي مرض يصيب الغدة الكظرية (<b>adrenal gland</b>)."},
{cat:'tf',isTF:true,q:"Parathyroidoma is a tumor of the parathyroid glands.",opts:["True","False"],c:0,exp:"<b>صحيح ✅</b> — <b>Parathyroidoma</b>: parathyroid (جارات الدرقية) + oma (ورم / tumor) = ورم في الغدد جارات الدرقية (<b>parathyroid glands</b>)."},
];
const ALL=[...MCQ,...TF];
function selectCat(c,btn){cat=c;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('qCount').textContent=(c==='all'?ALL:c==='mcq'?MCQ:TF).length;}
function startQuiz(){qs=cat==='all'?[...ALL]:cat==='mcq'?[...MCQ]:[...TF];ans=0;cor=0;wr=0;document.getElementById('startScreen').style.display='none';document.getElementById('quizWrapper').style.display='block';document.getElementById('stickyBar').style.display='block';document.getElementById('resultsBox').style.display='none';document.getElementById('submitBtn').disabled=true;render();tick();}
function render(){const c=document.getElementById('cardsContainer');c.innerHTML='';qs.forEach((q,i)=>{const d=document.createElement('div');d.className='q-card';d.id='card_'+i;const oh=q.opts.map((o,j)=>`<button class="opt" id="opt_${i}_${j}" onclick="pick(${i},${j},${q.c})"><span class="opt-letter">${q.isTF?(j===0?'T':'F'):L[j]}</span>${o}</button>`).join('');d.innerHTML=`<div class="q-header"><div class="q-num">${i+1}</div><span class="cat-tag ${q.cat}">${q.cat==='mcq'?'MCQ':'True / False'}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div><div class="q-feedback" id="fb_${i}"></div>`;c.appendChild(d);});}
function pick(i,chosen,ci){const q=qs[i];for(let j=0;j<q.opts.length;j++){const b=document.getElementById('opt_'+i+'_'+j);b.disabled=true;if(j===ci)b.classList.add('correct');else if(j===chosen)b.classList.add('wrong');}const fb=document.getElementById('fb_'+i);const card=document.getElementById('card_'+i);const ok=chosen===ci;if(ok){cor++;card.classList.add('answered-correct');}else{wr++;card.classList.add('answered-wrong');}ans++;fb.style.display='block';fb.className='q-feedback '+(ok?'correct':'wrong');fb.innerHTML=q.exp;tick();if(ans===qs.length)document.getElementById('submitBtn').disabled=false;}
function tick(){const t=qs.length;document.getElementById('sNum').textContent=ans+'/'+t;document.getElementById('sC').textContent='✅ '+cor;document.getElementById('sW').textContent='❌ '+wr;document.getElementById('sP').textContent='📊 '+(t>0?Math.round((cor/t)*100):0)+'%';document.getElementById('sFill').style.width=(t>0?(ans/t)*100:0)+'%';}
function showResults(){const box=document.getElementById('resultsBox');box.style.display='block';box.scrollIntoView({behavior:'smooth'});const t=qs.length,p=t>0?Math.round((cor/t)*100):0;document.getElementById('rScore').textContent=cor;document.getElementById('rTotal').textContent=t;document.getElementById('rC').textContent=cor;document.getElementById('rW').textContent=wr;document.getElementById('rP').textContent=p+'%';const m=['🌟 ممتاز! استمر هكذا!','👏 عمل رائع!','💪 جهد جيد!','📚 واصل المذاكرة!','🔄 التكرار مفتاح النجاح!'];document.getElementById('rMsg').textContent=p>=90?m[0]:p>=75?m[1]:p>=60?m[2]:p>=40?m[3]:m[4];document.getElementById('ringFg').style.strokeDashoffset=402-(402*p/100);const rev=document.getElementById('reviewDiv');const wrongs=[];qs.forEach((q,i)=>{if(Array.from(document.querySelectorAll(`[id^="opt_${i}_"]`)).some(b=>b.classList.contains('wrong')))wrongs.push(q);});rev.innerHTML=wrongs.length>0?`<h3>❌ مراجعة الأخطاء (${wrongs.length})</h3>`+wrongs.map(q=>`<div class="rev-item wrong"><div class="rt">${q.q}</div><div class="correct-ans">✅ ${q.opts[q.c]}</div><div class="exp">${q.exp}</div></div>`).join(''):'<h3>🎉 إجابات صحيحة 100%! أحسنت!</h3>';}
function goHome(){document.getElementById('startScreen').style.display='block';document.getElementById('quizWrapper').style.display='none';document.getElementById('stickyBar').style.display='none';}
document.getElementById('qCount').textContent=ALL.length;
</script>
</body>
